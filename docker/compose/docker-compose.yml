name: devbox

services:

  devbox:

    image: devbox-lite

    container_name: devbox-lite

    hostname: devbox-lite

    working_dir: /workspace

    stdin_open: true

    tty: true

    restart: "no"

    healthcheck:
      test: ["CMD", "bash", "-c", "php -v && node -v && python3 --version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    ports:
      - "6080:6080"
      - "8000:8000"
      - "3000:3000"

    volumes:
      - ${WORKSPACE_PATH:-../../}:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - bruno-config:/root/.config/bruno
      - bruno-collections:/root/bruno
      - pnpm-store:/root/.local/share/pnpm/store
      # Performance: node_modules/vendor/venv on fast Docker volumes instead of slow Windows bind mount
      - node-modules-laravel:/workspace/laravel/node_modules
      - vendor-laravel:/workspace/laravel/vendor
      - node-modules-nextjs:/workspace/next-js/node_modules
      - venv-python:/workspace/python/venv

    environment:
      TZ: ${TZ:-Asia/Tehran}

    networks:
      - devbox-network

networks:
  devbox-network:
    name: devbox-network

volumes:
  pnpm-store:
  node-modules-laravel:
  vendor-laravel:
  node-modules-nextjs:
  venv-python:
  bruno-config:
  bruno-collections:
