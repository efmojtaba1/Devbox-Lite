name: devbox

services:

  devbox:

    image: devbox-lite

    container_name: devbox-lite

    hostname: devbox-lite

    working_dir: /workspace

    stdin_open: true

    tty: true

    restart: "no"

    healthcheck:
      test: ["CMD", "bash", "-c", "php -v && node -v && python3 --version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    ports:
      - "6080:6080"
      - "8000:8000"
      - "3000:3000"

    volumes:
      - ${WORKSPACE_PATH:-../../}:/workspace:cached
      - ${SCRIPTS_PATH:-../../scripts}:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - bruno-config:/root/.config/bruno
      - bruno-collections:/root/bruno
      - pnpm-store:/root/.local/share/pnpm/store
      # Shared dependencies volume (node_modules/vendor/venv stored here)
      - devbox-deps:/workspace/.deps

    environment:
      TZ: ${TZ:-Asia/Tehran}

    networks:
      - devbox-network

networks:
  devbox-network:
    name: devbox-network

volumes:
  pnpm-store:
  devbox-deps:
  bruno-config:
  bruno-collections:
